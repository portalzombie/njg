
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보건관리자 포트폴리오</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bottom-nav-active { color: #2563eb; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-20">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 p-1.5 rounded-lg text-white">
                <i class="fas fa-shield-halved"></i>
            </div>
            <span class="font-bold text-lg tracking-tight">HealthGuard Admin</span>
        </div>
        <button class="p-2 text-gray-600">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </header>

    <!-- Main Content Area -->
    <div id="content">
        <!-- Home Section (Default) -->
        <div id="home-section" class="animate-in fade-in duration-500">
            <!-- Hero Section -->
            <section class="bg-gradient-to-br from-blue-700 to-indigo-800 text-white px-6 py-10 rounded-b-[2.5rem] shadow-lg">
                <h1 class="text-2xl font-bold mb-2 leading-snug">안녕하세요,<br>보건관리자 <span class="text-blue-200">김안전</span>입니다.</h1>
                <p class="text-blue-100 text-sm mb-6 leading-relaxed opacity-90">
                    근로자의 건강이 곧 현장의 안전입니다.<br>체계적인 데이터 관리로 무재해 현장을 만듭니다.
                </p>
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 text-center border border-white/20">
                        <span class="block text-xl font-bold">5+</span>
                        <span class="text-[10px] text-blue-100 uppercase font-medium">경력(년)</span>
                    </div>
                    <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 text-center border border-white/20">
                        <span class="block text-xl font-bold">12</span>
                        <span class="text-[10px] text-blue-100 uppercase font-medium">자격증</span>
                    </div>
                    <div class="bg-white/10 backdrop-blur-md rounded-xl p-3 text-center border border-white/20">
                        <span class="block text-xl font-bold">8</span>
                        <span class="text-[10px] text-blue-100 uppercase font-medium">완료현장</span>
                    </div>
                </div>
            </section>

            <!-- Quick Action Card -->
            <section class="px-5 -mt-6">
                <div class="bg-white rounded-2xl shadow-md p-4 flex justify-between items-center border border-gray-100">
                    <div class="flex items-center space-x-3">
                        <div class="bg-orange-100 p-2.5 rounded-full text-orange-600">
                            <i class="fas fa-temperature-high"></i>
                        </div>
                        <div>
                            <p class="text-[11px] text-gray-500 font-bold uppercase tracking-tighter">오늘의 현장 컨디션</p>
                            <p class="text-sm font-bold text-gray-800">폭염 주의보 발령</p>
                        </div>
                    </div>
                    <button class="bg-blue-50 text-blue-600 px-3 py-2 rounded-lg text-xs font-bold active:bg-blue-100 transition-colors">
                        대응 지침
                    </button>
                </div>
            </section>

            <!-- Projects -->
            <section class="px-5 mt-8">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-lg font-bold flex items-center">
                        <i class="fas fa-hard-hat mr-2 text-blue-600"></i>관리 현장
                    </h2>
                    <span class="text-xs text-blue-600 font-semibold cursor-pointer">전체보기</span>
                </div>
                <div class="space-y-3">
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center active:scale-[0.98] transition-transform">
                        <div>
                            <h3 class="font-bold text-gray-800">OO 메트로 3공구 건설현장</h3>
                            <p class="text-xs text-gray-500 mt-1">2023 - 현재 | 보건선임 관리자</p>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300"></i>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center active:scale-[0.98] transition-transform">
                        <div>
                            <h3 class="font-bold text-gray-800">XX 테크노밸리 조성공사</h3>
                            <p class="text-xs text-gray-500 mt-1">2021 - 2023 | 보건관리 담당</p>
                        </div>
                        <i class="fas fa-chevron-right text-gray-300"></i>
                    </div>
                </div>
            </section>

            <!-- Resources -->
            <section class="px-5 mt-8 mb-8">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-lg font-bold flex items-center">
                        <i class="fas fa-folder-open mr-2 text-blue-600"></i>업무 자료실
                    </h2>
                    <span class="text-xs text-blue-600 font-semibold cursor-pointer">더보기</span>
                </div>
                <div class="grid grid-cols-1 gap-3">
                    <div class="bg-white p-4 rounded-xl border border-gray-100 flex items-center space-x-4 shadow-sm active:bg-gray-50 transition-colors">
                        <div class="bg-red-50 p-3 rounded-lg text-red-500">
                            <i class="fas fa-file-pdf text-xl"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-sm font-semibold text-gray-800 tracking-tight">夏季 온열질환 예방 가이드</p>
                            <span class="text-[10px] text-gray-400 font-bold uppercase">PDF | 2.4MB</span>
                        </div>
                        <button class="text-gray-400 hover:text-blue-600 p-2">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-gray-100 flex items-center space-x-4 shadow-sm active:bg-gray-50 transition-colors">
                        <div class="bg-green-50 p-3 rounded-lg text-green-600">
                            <i class="fas fa-file-excel text-xl"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-sm font-semibold text-gray-800 tracking-tight">TBM 보건교육 일지 양식</p>
                            <span class="text-[10px] text-gray-400 font-bold uppercase">XLSX | 1.1MB</span>
                        </div>
                        <button class="text-gray-400 hover:text-blue-600 p-2">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full h-16 bg-white/90 backdrop-blur-lg border-t flex items-center justify-around px-2 safe-area-bottom shadow-[0_-1px_10px_rgba(0,0,0,0.05)]">
        <button onclick="showSection('home')" class="nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 bottom-nav-active">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px] font-bold uppercase">홈</span>
        </button>
        <button onclick="showSection('projects')" class="nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-400">
            <i class="fas fa-building text-lg"></i>
            <span class="text-[10px] font-bold uppercase">현장</span>
        </button>
        <button onclick="showSection('files')" class="nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-400">
            <i class="fas fa-file-invoice text-lg"></i>
            <span class="text-[10px] font-bold uppercase">자료</span>
        </button>
        <button onclick="showSection('profile')" class="nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-400">
            <i class="fas fa-user-tie text-lg"></i>
            <span class="text-[10px] font-bold uppercase">정보</span>
        </button>
    </nav>

    <script>
        function showSection(id) {
            // 버튼 스타일 초기화
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bottom-nav-active');
                btn.classList.add('text-gray-400');
            });
            // 클릭된 버튼 활성화
            event.currentTarget.classList.add('bottom-nav-active');
            event.currentTarget.classList.remove('text-gray-400');

            // 실제로는 여기에 섹션 전환 로직이 들어갑니다.
            // 현재는 시각적 효과만 구현되어 있습니다.
            console.log(id + " 섹션으로 이동");
        }
    </script>
</body>
</html>
